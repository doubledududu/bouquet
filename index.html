<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flash bouquet builder</title>
  <style>
    :root { --bg:#36373e; --panel:#d8c1c7; --ink:#e7ffe9; --muted:#2e262e; --line:#b2c39c; --accent:#eac9eb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background:var(--bg); color:var(--ink); }
    header {
      background:#7b8c7d;
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:flex-start;
    }
    header .left { display:flex; gap:12px; align-items:center; }
    header .title { font-weight:900; color:#d8c1c7;}
    header .hint { color:#000000; font-size:13px;}
    header .btns {
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    button {
      background: #d8c1c7;
      color:#111111;
      border: 1px solid var(--line);
      padding: 0;
      border-radius:12px;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
    }

    button:hover {
      border-color:#ffffff;
    }

    button.primary {
      border-color: rgba(122,162,255,.6);
      box-shadow: 0 0 0 2px rgba(122,162,255,.12) inset;
    }

    .toolBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-height:36px;
      padding:8px 12px;
      text-align:center;
      flex:0 0 auto;
    }

    .toolBtn img{
      width:18px;
      height:18px;
      object-fit:contain;
      display:block;
      flex:0 0 auto;
      pointer-events:none;
    }

    .toolBtn span{
      line-height:1;
      white-space:nowrap;
    }

    .exportBtn{
      background:#dff1e3;
      color:#1f2a20;
      border-color: rgba(122,162,255,.6);
      box-shadow: 0 0 0 2px rgba(122,162,255,.12) inset, 0 4px 12px rgba(0,0,0,.10);
      font-weight:700;
    }

    .exportBtn img{
      width:18px;
      height:18px;
    }

    main { display:grid; grid-template-columns: 320px 1fr; height: calc(100vh - 54px); }
    aside { border-right:1px solid var(--line); background:var(--panel); padding:12px; overflow:auto; }
    .section { margin-bottom:14px; }
    .section h3 { margin:0 0 8px 0; font-size:13px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
    .grid {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
    }
    .card {
      background:#7b8c7d; border:1px solid var(--line); border-radius:12px;
      padding:12px; cursor:pointer; user-select:none;
      display:flex; flex-direction:column; gap:8px; align-items:center; justify-content:center;
      min-height:130px;
    }
    .card:hover { border-color:#ffffff; }
    .card img { width:96px; height:96px; object-fit:contain; display:block; }
    .card .label { font-size:12px; font-weight: 600; color:var(--muted); text-align:center; }

    .controls { display:grid; gap:8px; }
    .row { display:grid; grid-template-columns: 120px 1fr; gap:8px; align-items:center; }
    .row label { color:var(--muted); font-size:12px; }
    input[type="range"] { width:100%; }
    input[type="number"], input[type="text"] {
      width:100%; background:#7b8c7d; border:1px solid var(--line); color:var(--ink);
      padding:8px 10px; border-radius:10px;
    }
    .tiny { font-size:12px; color:var(--muted); line-height:1.35; }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:11px; border:1px solid var(--line); padding:2px 6px; border-radius:8px; background:#0f1118; color:var(--ink); }
    .workwrap {
      padding:12px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .workspace {
      position:relative;
      width: 900px;
      height: 900px;
      margin:0 auto;
      touch-action: pan-x pan-y;
      background: repeating-conic-gradient(from 90deg, rgba(0,0,0,.05) 0 25%, rgba(0,0,0,.02) 0 50%) 0 / 40px 40px;
      border:1px solid var(--line);
      border-radius:16px;
    }
    .workspace::after{
      content:""; position:absolute; inset:14px; border:1px dashed rgba(255,255,255,.12); border-radius:12px; pointer-events:none;
    }
    .item {
      position:absolute;
      transform-origin: center center;
      cursor:grab;
      user-select:none;
      touch-action:none;
    }
    .item:active { cursor:grabbing; }
    .item.selected { outline:2px solid rgba(122,162,255,.9); outline-offset:4px; border-radius:10px; }
    .rotateHandle{
      position:absolute;
      width:26px;
      height:26px;
      right:-13px;
      top:-13px;
      border-radius:50%;
      background:#7b8c7d;
      border:2px solid #ffffff;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      display:none;
      z-index:2;
      cursor:grab;
    }
    .resizeHandle{
      position:absolute;
      width:26px;
      height:26px;
      right:-13px;
      bottom:-13px;
      border-radius:50%;
      background:#7b8c7d;
      border:2px solid #ffffff;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      display:none;
      z-index:2;
      cursor:nwse-resize;
    }

    .item.selected .resizeHandle{ display:block; }

    .resizeHandle::before{
      content:"↘";
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      font-weight:700;
      color:#111111;
      line-height:1;
    }

    .resizeHandle:active{ cursor:nwse-resize; }

    .item.selected .rotateHandle{ display:block; }

    .rotateHandle::before{
      content:"↻";
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      font-weight:700;
      color:#111111;
      line-height:1;
    }

    .rotateHandle:active{ cursor:grabbing; }

    .item img { display:block; width:100%; height:100%; object-fit:contain; pointer-events:none; }
    .item.touch-blocked {
      pointer-events: none !important;
    }

    .badge {
      position:absolute; top:-10px; left:-10px;
      font-size:11px; color:#0b0c10;
      background:rgba(122,162,255,.9);
      padding:2px 6px; border-radius:999px;
      pointer-events:none;
    }
    .dropNote {
      color:var(--muted); font-size:12px; text-align:center; margin-top:10px;
    }
    .toast {
      position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
      background:#10131c; border:1px solid var(--line); color:var(--ink);
      padding:10px 12px; border-radius:12px; font-size:13px; opacity:0; pointer-events:none;
      transition: opacity .18s ease;
    }
    .toast.show { opacity:1; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #ffffff;
      border-radius: 999px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #7b8c7d;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #ffffff;
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #111111;
      border-radius: 50%;
      border: none;
    }

    .paletteSlogan{
      font-weight: 900;
      font-size: 16px;
      color: #283429;
      letter-spacing: .02em;
      margin-top: 10px;
    }

    .mobileFabWrap,
    .mobileToolsPanel,
    .mobileToolsFab,
    .mobileExportFab,
    .mobileActionBtn{
      display:none;
    }

    /* ===== Desktop ===== */
    @media (min-width: 901px) {
      header {
        justify-content:flex-start;
      }

      header .btns {
        position: fixed;
        top: 78px;
        right: 16px;
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
      }

      .toolBtn{
        display:flex;
        align-items:center;
        justify-content:flex-start;
        gap:8px;
        min-height:42px;
        min-width:160px;
        padding:10px 14px;
        text-align:left;
        box-shadow: 0 3px 10px rgba(0,0,0,.10);
      }

      .workwrap {
        padding:12px 210px 12px 12px;
      }

      .workspace {
        width: min(1200px, calc(100vw - 420px));
        height: min(1200px, calc(100vh - 110px));
        min-width: 700px;
        min-height: 700px;
      }
    }

    /* ===== Mobile / tablette ===== */
    @media (max-width: 900px) {
      body {
        overflow-x: hidden;
      }

      .rotateHandle,
      .resizeHandle {
        display: none !important;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        padding: 8px 10px;
      }

      header .left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        width: 100%;
      }

      header .title {
        font-size: 14px;
      }

      header .hint {
        font-size: 11px;
        line-height: 1.2;
      }

      header .btns {
        display:none;
      }

      .toolBtn{
        gap:5px;
        min-height:38px;
        padding:8px 10px;
      }

      .toolBtn img{
        width:15px;
        height:15px;
      }

      .toolBtn span{
        font-size:10px;
        line-height:1;
      }

      .exportBtn{
        grid-column: 1 / -1;
        justify-self: center;
        width: auto;
        min-width: 180px;
        padding: 10px 16px;
      }

      .exportBtn img{
        width:18px;
        height:18px;
      }

      main {
        display: flex;
        flex-direction: column;
        height: auto;
      }

      .workwrap {
        order: 1;
        padding: 8px;
        overflow: visible;
        min-height: auto;
      }

      aside {
        order: 2;
        border: none;
        border-top: 1px solid var(--line);
        padding: 8px 10px 90px 10px;
        background: var(--panel);
      }

      .workspace {
        width: 100%;
        max-width: none;
        height: calc(100vh - 230px);
        min-height: 520px;
        margin: 0 auto;
        overflow: hidden;
      }

      aside details.section:first-child {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        margin: 0;
        padding: 8px 10px 10px 10px;
        background: var(--panel);
        border-top: 1px solid var(--line);
        box-shadow: 0 -6px 18px rgba(0,0,0,.16);
      }

      aside details.section:first-child summary {
        margin-bottom: 8px;
      }

      aside details.section:first-child .paletteSlogan {
        display: none;
      }

      #palette {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
      }

      #palette .card {
        flex: 0 0 92px;
        min-height: 92px;
        padding: 6px;
        border-radius: 12px;
        scroll-snap-align: start;
      }

      #palette .card img {
        width: 46px;
        height: 46px;
      }

      #palette .card .label {
        font-size: 10px;
        line-height: 1.1;
      }

      aside details.section:last-child {
        margin-bottom: 0;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 4px;
        align-items: stretch;
      }

      .row label {
        font-size: 12px;
      }

      input[type="range"] {
        height: 10px;
      }

      .item.selected {
        outline-width: 3px;
        outline-offset: 2px;
      }

      .mobileFabWrap{
        display:block;
        position:fixed;
        right:12px;
        bottom:108px;
        z-index:60;
        pointer-events:none;
      }

      .mobileToolsPanel{
        position:absolute;
        right:0;
        bottom:58px;
        display:none;
        flex-direction:column;
        gap:8px;
        pointer-events:auto;
      }

      .mobileToolsPanel.open{
        display:flex;
      }

      .mobileToolsFab,
      .mobileExportFab,
      .mobileActionBtn{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        border:1px solid var(--line);
        border-radius:14px;
        background:#d8c1c7;
        color:#111111;
        box-shadow:0 6px 18px rgba(0,0,0,.18);
        pointer-events:auto;
      }

      .mobileToolsFab{
        min-height:48px;
        min-width:110px;
        padding:12px 16px;
        font-size:14px;
        font-weight:700;
      }

      .mobileExportFab{
        position:fixed;
        left:12px;
        right:auto;
        bottom:108px;
        min-height:48px;
        padding:12px 16px;
        background:#dff1e3;
        color:#1f2a20;
        border-color: rgba(122,162,255,.6);
        box-shadow: 0 0 0 2px rgba(122,162,255,.12) inset, 0 6px 18px rgba(0,0,0,.18);
        font-weight:700;
        z-index:60;
      }

      .mobileExportFab img,
      .mobileActionBtn img{
        width:16px;
        height:16px;
        object-fit:contain;
        pointer-events:none;
      }

      .mobileExportFab span,
      .mobileActionBtn span{
        line-height:1;
        white-space:nowrap;
        font-size:12px;
      }

      .mobileActionBtn{
        justify-content:flex-start;
        min-width:150px;
        min-height:44px;
        padding:10px 12px;
      }

      aside {
        padding: 8px 10px 170px 10px;
      }

      aside details.section:first-child {
        padding: 8px 10px 12px 10px;
      }
    }

    @media (max-width: 600px) {
      header .btns {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .workspace {
        height: calc(100vh - 210px);
        min-height: 460px;
      }

      #palette .card {
        flex: 0 0 84px;
        min-height: 84px;
      }

      #palette .card img {
        width: 40px;
        height: 40px;
      }

      #palette .card .label {
        font-size: 9px;
      }

      .exportBtn{
        width: auto;
        min-width: 170px;
      }

      .mobileToolsFab{
        min-width:100px;
        min-height:46px;
        padding:10px 14px;
      }

      .mobileExportFab{
        min-height:46px;
        padding:10px 14px;
      }

      .mobileActionBtn{
        min-width:140px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <div class="title">Flash bouquet builder</div>
      <div class="hint">Clique pour ajouter. Glisse pour déplacer. <span class="kbd">Suppr</span> efface. <span class="kbd">Ctrl+D</span> duplique.</div>
    </div>
    <div class="btns">
      <button class="toolBtn" id="btnClear">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/corbeille_i54gwz.png" alt="">
        <span>Effacer</span>
      </button>

      <button class="toolBtn" id="btnCenter">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/center_fmldze.png" alt="">
        <span>Centrer</span>
      </button>

      <button class="toolBtn" id="btnFlipH">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/flip_H_mdaypu.png" alt="">
        <span>Miroir H</span>
      </button>

      <button class="toolBtn" id="btnFlipV">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334752/flip_V_q3v1x1.png" alt="">
        <span>Miroir V</span>
      </button>

      <button class="toolBtn" id="btnToBack">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334749/backward_oxnwqt.png" alt="">
        <span>Reculer</span>
      </button>

      <button class="toolBtn" id="btnToFront">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/forward_mmncyj.png" alt="">
        <span>Avancer</span>
      </button>

      <button class="toolBtn primary exportBtn" id="btnExportPNG">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334751/save_woziav.png" alt="">
        <span>Exporter</span>
      </button>
    </div>
  </header>

  <main>

    <aside>
      <details class="section" open>
        <summary><h3>Palette</h3></summary>
        <div class="grid" id="palette"></div>
        <div class="paletteSlogan">
          Personnalise ton propre bouquet !
        </div>
      </details>
    </aside>

    <div class="workwrap">
      <div class="workspace" id="ws" aria-label="workspace"></div>
      <div class="dropNote"></div>
    </div>

  </main>

  <div class="mobileFabWrap">
    <button class="mobileExportFab" id="btnMobileExport">
      <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334751/save_woziav.png" alt="">
      <span>Exporter</span>
    </button>

    <div class="mobileToolsPanel" id="mobileToolsPanel">
      <button class="mobileActionBtn" id="btnMobileClear">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/corbeille_i54gwz.png" alt="">
        <span>Effacer</span>
      </button>

      <button class="mobileActionBtn" id="btnMobileCenter">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/center_fmldze.png" alt="">
        <span>Centrer</span>
      </button>

      <button class="mobileActionBtn" id="btnMobileFlipH">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/flip_H_mdaypu.png" alt="">
        <span>Miroir H</span>
      </button>

      <button class="mobileActionBtn" id="btnMobileFlipV">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334752/flip_V_q3v1x1.png" alt="">
        <span>Miroir V</span>
      </button>

      <button class="mobileActionBtn" id="btnMobileBack">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334749/backward_oxnwqt.png" alt="">
        <span>Reculer</span>
      </button>

      <button class="mobileActionBtn" id="btnMobileFront">
        <img src="https://res.cloudinary.com/diz2tt1gw/image/upload/v1773334750/forward_mmncyj.png" alt="">
        <span>Avancer</span>
      </button>
    </div>

    <button class="mobileToolsFab" id="btnMobileTools">
      <span>Outils</span>
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const LIB = [
      {
        id: "Branche",
        label: "Branche",
        src: "https://res.cloudinary.com/diz2tt1gw/image/upload/v1772067820/619521521_882257137724350_4229399370122049159_n_un4f0d.png"
      },
      {
        id: "Liane Torsade",
        label: "Liane Torsade",
        src: "https://res.cloudinary.com/diz2tt1gw/image/upload/v1772067819/616742827_1779079892762636_82883859183779307_n_mg2klm.png"
      },
      {
        id: "Grenouille",
        label: "Grenouille",
        src: "https://res.cloudinary.com/diz2tt1gw/image/upload/v1772101915/617055237_1374553773884231_136022804121882196_n_makez9.png"
      },
      {
        id: "Monstera",
        label: "Monstera",
        src: "https://res.cloudinary.com/diz2tt1gw/image/upload/v1772067825/619367847_1197128552086410_1477195909441759372_n_dykibo.png"
      },
      {
        id: "Pillon",
        label: "Pillon",
        src: "https://res.cloudinary.com/diz2tt1gw/image/upload/v1772067852/616334821_1552614829401272_758795181194598895_n_wcmyqa.png"
      },
    ];

    const ws = document.getElementById("ws");
    const palette = document.getElementById("palette");
    const toast = document.getElementById("toast");

    let selected = null;
    let zCounter = 1;
    let zoom = 1;
    let activeTouchItem = null;

    function updateTouchLockState(){
      const items = ws.querySelectorAll(".item");
      items.forEach(el => el.classList.remove("touch-blocked"));

      if(window.innerWidth > 900) return;
      if(!activeTouchItem) return;

      items.forEach(el => {
        if(el !== activeTouchItem.el){
          el.classList.add("touch-blocked");
        }
      });
    }

    const ITEMS = [];
    let uidCounter = 1;

    function registerItem(item){
      item.uid = "i" + (uidCounter++);
      item.el.dataset.uid = item.uid;
      ITEMS.push(item);
    }

    function removeItemByUid(uid){
      const idx = ITEMS.findIndex(it => it.uid === uid);
      if(idx >= 0) ITEMS.splice(idx, 1);
    }

    function findItemByUid(uid){
      return ITEMS.find(it => it.uid === uid);
    }

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(()=>toast.classList.remove("show"), 1200);
    }

    function renderPalette(){
      palette.innerHTML = "";
      for(const item of LIB){
        const card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        card.dataset.libId = item.id;

        const img = document.createElement("img");
        img.crossOrigin = "anonymous";
        img.src = item.src;
        img.alt = item.label;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = item.label;

        card.appendChild(img);
        card.appendChild(label);

        card.addEventListener("click", ()=>{
          const defaultSize = getDefaultItemSize();
          const centerX = (ws.clientWidth / 2) - (defaultSize / 2);
          const centerY = (ws.clientHeight / 2) - (defaultSize / 2);
          addItem(item.id, centerX, centerY);
        });

        card.addEventListener("dragstart", (e)=>{
          e.dataTransfer.setData("text/plain", item.id);
        });

        palette.appendChild(card);
      }
    }

    function deselect(){
      if(selected){
        selected.el.classList.remove("selected");
      }
      selected = null;
    }

    function select(item){
      if(selected && selected.el === item.el) return;
      deselect();
      selected = item;
      selected.el.classList.add("selected");
    }

    function libById(id){ return LIB.find(x=>x.id===id); }

    function addItem(libId, x, y){
      const src = libById(libId);
      if(!src) return;

      const defaultSize = getDefaultItemSize();

      const el = document.createElement("div");
      el.className = "item";
      el.style.left = x + "px";
      el.style.top  = y + "px";
      el.style.width = defaultSize + "px";
      el.style.height = defaultSize + "px";
      el.style.zIndex = String(++zCounter);
      el.dataset.libId = libId;

      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = src.label;

      const rotateHandle = document.createElement("div");
      rotateHandle.className = "rotateHandle";
      rotateHandle.title = "Faire pivoter";

      const resizeHandle = document.createElement("div");
      resizeHandle.className = "resizeHandle";
      resizeHandle.title = "Redimensionner";

      const img = document.createElement("img");
      img.crossOrigin = "anonymous"; // FIX: CORS pour export canvas
      img.src = src.src;
      img.alt = src.label;

      el.appendChild(badge);
      el.appendChild(rotateHandle);
      el.appendChild(resizeHandle);
      el.appendChild(img);

      const item = {
        el, libId,
        x, y, w: defaultSize, h: defaultSize,
        rot:0,
        flipX:false,
        flipY:false,
        name: src.label
      };

      function apply(){
        el.style.left = item.x + "px";
        el.style.top  = item.y + "px";
        el.style.width = item.w + "px";
        el.style.height = item.h + "px";
        const sx = item.flipX ? -1 : 1;
        const sy = item.flipY ? -1 : 1;
        el.style.transform = `scale(${sx}, ${sy}) rotate(${item.rot}deg)`;
      }
      item.apply = apply;
      apply();

      let drag = null;
      let touchGesture = null;
      let rotateDrag = null;
      let resizeDrag = null;

      el.addEventListener("pointerdown", (e)=>{
        // Ne pas capturer si c'est un handle
        if(e.target === rotateHandle || e.target === resizeHandle) return;

        e.preventDefault();
        select(item);
        el.setPointerCapture(e.pointerId);

        const rect = ws.getBoundingClientRect();
        const startX = (e.clientX - rect.left) / zoom;
        const startY = (e.clientY - rect.top) / zoom;

        drag = {
          mode: "move",
          startX, startY,
          baseX: item.x, baseY: item.y,
          baseW: item.w, baseH: item.h
        };
      });

      el.addEventListener("pointermove", (e)=>{
        if(!drag) return;
        const rect = ws.getBoundingClientRect();
        const cx = (e.clientX - rect.left) / zoom;
        const cy = (e.clientY - rect.top) / zoom;
        const dx = cx - drag.startX;
        const dy = cy - drag.startY;

        if(drag.mode === "move"){
          const bounds = getMoveBounds(item.w, item.h);
          item.x = clamp(drag.baseX + dx, bounds.minX, bounds.maxX);
          item.y = clamp(drag.baseY + dy, bounds.minY, bounds.maxY);
        }
        item.apply();
      });

      el.addEventListener("pointerup", ()=>{
        drag = null;
      });

      // --- Rotate handle ---
      rotateHandle.addEventListener("pointerdown", (e)=>{
        e.preventDefault();
        e.stopPropagation();
        select(item);

        const rect = ws.getBoundingClientRect();
        const centerX = item.x + item.w / 2;
        const centerY = item.y + item.h / 2;
        const pointerX = (e.clientX - rect.left) / zoom;
        const pointerY = (e.clientY - rect.top) / zoom;

        rotateDrag = {
          startRot: item.rot,
          startAngle: Math.atan2(pointerY - centerY, pointerX - centerX) * 180 / Math.PI,
          centerX,
          centerY,
          pointerId: e.pointerId
        };
        rotateHandle.setPointerCapture(e.pointerId);
      });

      rotateHandle.addEventListener("pointermove", (e)=>{
        if(!rotateDrag || e.pointerId !== rotateDrag.pointerId) return;
        e.preventDefault();

        const rect = ws.getBoundingClientRect();
        const pointerX = (e.clientX - rect.left) / zoom;
        const pointerY = (e.clientY - rect.top) / zoom;
        const currentAngle = Math.atan2(pointerY - rotateDrag.centerY, pointerX - rotateDrag.centerX) * 180 / Math.PI;
        item.rot = rotateDrag.startRot + (currentAngle - rotateDrag.startAngle);
        item.apply();
      });

      rotateHandle.addEventListener("pointerup", (e)=>{
        if(rotateDrag && e.pointerId === rotateDrag.pointerId) rotateDrag = null;
      });

      rotateHandle.addEventListener("pointercancel", ()=>{ rotateDrag = null; });

      // --- Resize handle ---
      resizeHandle.addEventListener("pointerdown", (e)=>{
        e.preventDefault();
        e.stopPropagation();
        select(item);

        const rect = ws.getBoundingClientRect();
        resizeDrag = {
          startX: (e.clientX - rect.left) / zoom,
          startY: (e.clientY - rect.top) / zoom,
          baseW: item.w,
          baseH: item.h,
          pointerId: e.pointerId
        };
        resizeHandle.setPointerCapture(e.pointerId);
      });

      resizeHandle.addEventListener("pointermove", (e)=>{
        if(!resizeDrag || e.pointerId !== resizeDrag.pointerId) return;
        e.preventDefault();

        const rect = ws.getBoundingClientRect();
        const currentX = (e.clientX - rect.left) / zoom;
        const currentY = (e.clientY - rect.top) / zoom;
        const dx = currentX - resizeDrag.startX;
        const dy = currentY - resizeDrag.startY;
        const d = Math.max(dx, dy);
        const newSize = clamp(resizeDrag.baseW + d, 30, getMaxItemSize());

        item.w = newSize;
        item.h = newSize;

        const bounds = getMoveBounds(item.w, item.h);
        item.x = clamp(item.x, bounds.minX, bounds.maxX);
        item.y = clamp(item.y, bounds.minY, bounds.maxY);
        item.apply();
      });

      resizeHandle.addEventListener("pointerup", (e)=>{
        if(resizeDrag && e.pointerId === resizeDrag.pointerId) resizeDrag = null;
      });

      resizeHandle.addEventListener("pointercancel", ()=>{ resizeDrag = null; });

      // --- Double-click reset rotation ---
      el.addEventListener("dblclick", ()=>{
        item.rot = 0;
        item.apply();
      });

      // --- Touch gestures (mobile) ---
      el.addEventListener("touchstart", (e)=>{
        if(activeTouchItem && activeTouchItem !== item){
          e.preventDefault();
          e.stopPropagation();
          return;
        }

        activeTouchItem = item;
        updateTouchLockState();

        e.preventDefault();
        e.stopPropagation();
        select(item);

        const rect = ws.getBoundingClientRect();

        if(e.touches.length === 1){
          const p = getTouchPoint(e.touches[0], rect);
          touchGesture = {
            mode: "move",
            startX: p.x, startY: p.y,
            baseX: item.x, baseY: item.y
          };
        }

        if(e.touches.length >= 2){
          const p1 = getTouchPoint(e.touches[0], rect);
          const p2 = getTouchPoint(e.touches[1], rect);
          const centerX = (p1.x + p2.x) / 2;
          const centerY = (p1.y + p2.y) / 2;

          touchGesture = {
            mode: "transform",
            startDistance: getDistance(p1, p2),
            startAngle: getAngle(p1, p2),
            baseW: item.w, baseH: item.h,
            baseRot: item.rot,
            baseX: item.x, baseY: item.y,
            baseCenterX: item.x + item.w / 2,
            baseCenterY: item.y + item.h / 2,
            startCenterX: centerX,
            startCenterY: centerY
          };
        }
      }, { passive:false });

      el.addEventListener("touchmove", (e)=>{
        if(activeTouchItem !== item) return;
        if(!touchGesture) return;

        e.preventDefault();
        e.stopPropagation();

        const rect = ws.getBoundingClientRect();

        if(touchGesture.mode === "move" && e.touches.length === 1){
          const p = getTouchPoint(e.touches[0], rect);
          const dx = p.x - touchGesture.startX;
          const dy = p.y - touchGesture.startY;

          const bounds = getMoveBounds(item.w, item.h);
          item.x = clamp(touchGesture.baseX + dx, bounds.minX, bounds.maxX);
          item.y = clamp(touchGesture.baseY + dy, bounds.minY, bounds.maxY);
          item.apply();
        }

        if(touchGesture.mode === "transform" && e.touches.length === 2){
          const p1 = getTouchPoint(e.touches[0], rect);
          const p2 = getTouchPoint(e.touches[1], rect);

          const currentDistance = getDistance(p1, p2);
          const currentAngle = getAngle(p1, p2);
          const currentCenterX = (p1.x + p2.x) / 2;
          const currentCenterY = (p1.y + p2.y) / 2;

          const scaleRatio = currentDistance / touchGesture.startDistance;
          const newSize = clamp(touchGesture.baseW * scaleRatio, 30, getMaxItemSize());
          const angleDelta = currentAngle - touchGesture.startAngle;
          const moveCenterX = currentCenterX - touchGesture.startCenterX;
          const moveCenterY = currentCenterY - touchGesture.startCenterY;

          item.w = newSize;
          item.h = newSize;
          item.rot = touchGesture.baseRot + angleDelta;

          const newCenterX = touchGesture.baseCenterX + moveCenterX;
          const newCenterY = touchGesture.baseCenterY + moveCenterY;
          item.x = newCenterX - item.w / 2;
          item.y = newCenterY - item.h / 2;

          const bounds = getMoveBounds(item.w, item.h);
          item.x = clamp(item.x, bounds.minX, bounds.maxX);
          item.y = clamp(item.y, bounds.minY, bounds.maxY);
          item.apply();
        }
      }, { passive:false });

      el.addEventListener("touchend", (e)=>{
        if(activeTouchItem !== item) return;

        e.preventDefault();
        e.stopPropagation();

        if(e.touches.length === 0){
          touchGesture = null;
          activeTouchItem = null;
          updateTouchLockState();
          return;
        }

        const rect = ws.getBoundingClientRect();

        if(e.touches.length === 1){
          const p = getTouchPoint(e.touches[0], rect);
          touchGesture = {
            mode: "move",
            startX: p.x, startY: p.y,
            baseX: item.x, baseY: item.y
          };
        }

        if(e.touches.length === 2){
          const p1 = getTouchPoint(e.touches[0], rect);
          const p2 = getTouchPoint(e.touches[1], rect);
          const centerX = (p1.x + p2.x) / 2;
          const centerY = (p1.y + p2.y) / 2;

          touchGesture = {
            mode: "transform",
            startDistance: getDistance(p1, p2),
            startAngle: getAngle(p1, p2),
            baseW: item.w, baseH: item.h,
            baseRot: item.rot,
            baseX: item.x, baseY: item.y,
            baseCenterX: item.x + item.w / 2,
            baseCenterY: item.y + item.h / 2,
            startCenterX: centerX,
            startCenterY: centerY
          };
        }
      }, { passive:false });

      el.addEventListener("touchcancel", ()=>{
        if(activeTouchItem === item){
          touchGesture = null;
          activeTouchItem = null;
          updateTouchLockState();
        }
      });

      registerItem(item);
      ws.appendChild(el);
      select(item);
      return item;
    }

    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

    function getTouchPoint(touch, rect){
      return {
        x: (touch.clientX - rect.left) / zoom,
        y: (touch.clientY - rect.top) / zoom
      };
    }

    function getDistance(a, b){
      return Math.hypot(b.x - a.x, b.y - a.y);
    }

    function getAngle(a, b){
      return Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    }

    function resizeWorkspaceForMobile(){
      const isMobile = window.innerWidth <= 900;

      if(isMobile){
        ws.style.width = "100%";
        ws.style.height = "";
        zoom = 1;
        ws.style.transform = "scale(1)";
        ws.parentElement.style.height = "";
      } else {
        ws.style.width = "";
        ws.style.height = "";
        zoom = 1;
        ws.style.transform = "scale(1)";
        ws.parentElement.style.height = "";
      }
    }

    function getDefaultItemSize(){
      if(window.innerWidth <= 900) return 180;
      return 340;
    }

    function getMaxItemSize(){
      if(window.innerWidth <= 900){
        return Math.min(ws.clientWidth, ws.clientHeight) * 0.95;
      }
      return 2000;
    }

    function getMoveBounds(itemW, itemH){
      if(window.innerWidth <= 900){
        const pad = 10;
        return {
          minX: pad,
          minY: pad,
          maxX: ws.clientWidth - itemW - pad,
          maxY: ws.clientHeight - itemH - pad
        };
      }
      return {
        minX: -200,
        minY: -200,
        maxX: ws.clientWidth - 20,
        maxY: ws.clientHeight - 20
      };
    }

    // FIX: Déselection — clic dans le vide déselectionne toujours
    ws.addEventListener("pointerdown", (e)=>{
      if(e.target === ws) deselect();
    });

    ws.addEventListener("dragover", (e)=>{ e.preventDefault(); });
    ws.addEventListener("drop", (e)=>{
      e.preventDefault();
      const libId = e.dataTransfer.getData("text/plain");
      const rect = ws.getBoundingClientRect();
      const x = (e.clientX - rect.left) / zoom - 70;
      const y = (e.clientY - rect.top) / zoom - 70;
      addItem(libId, clamp(x, 0, ws.clientWidth-140), clamp(y, 0, ws.clientHeight-140));
    });

    function bindKeyboard(){
      window.addEventListener("keydown", (e)=>{
        // FIX: Ne pas supprimer si on est dans un input/textarea
        const tag = document.activeElement?.tagName;
        if(tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

        if((e.key === "Delete" || e.key === "Backspace") && selected){
          e.preventDefault();
          const uid = selected.uid;
          selected.el.remove();
          deselect();
          removeItemByUid(uid);
          showToast("Élément supprimé");
          return;
        }

        if(e.ctrlKey && e.key.toLowerCase() === "d"){
          e.preventDefault();
          if(selected){
            const clone = addItem(selected.libId, selected.x + 18, selected.y + 18);
            clone.w = selected.w; clone.h = selected.h;
            clone.rot = selected.rot;
            clone.flipX = selected.flipX;
            clone.flipY = selected.flipY;
            clone.name = selected.name;
            clone.apply();
            clone.el.style.zIndex = String(++zCounter);
            const badge = clone.el.querySelector(".badge");
            if(badge) badge.textContent = clone.name || libById(clone.libId)?.label || "Item";
            showToast("Dupliqué");
          }
          return;
        }

        if(!selected) return;

        if(e.ctrlKey && (e.key === "]" || e.key === "}")){
          e.preventDefault();
          selected.el.style.zIndex = String(++zCounter);
        }

        if(e.ctrlKey && (e.key === "[" || e.key === "{")){
          e.preventDefault();
          selected.el.style.zIndex = "1";
        }
      });
    }

    // FIX: Export PNG lit directement le tableau ITEMS (avec flipX/flipY)
    async function exportPNG(){
      const items = ITEMS.map(it => ({
        libId: it.libId,
        x: it.x,
        y: it.y,
        w: it.w,
        h: it.h,
        rot: it.rot,
        flipX: it.flipX,
        flipY: it.flipY,
        z: parseInt(it.el.style.zIndex || "1", 10),
        name: it.name
      })).sort((a,b) => a.z - b.z);

      if(!items.length){ showToast("Rien à exporter"); return; }

      const PAD = 80;

      function boundsOfItem(it){
        const cx = it.x + it.w/2;
        const cy = it.y + it.h/2;
        const rad = ((it.rot || 0) * Math.PI) / 180;
        const cos = Math.cos(rad);
        const sin = Math.sin(rad);
        const hw = it.w/2;
        const hh = it.h/2;
        const corners = [
          {x:-hw, y:-hh}, {x: hw, y:-hh},
          {x: hw, y: hh}, {x:-hw, y: hh},
        ];

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for(const p of corners){
          const rx = p.x * cos - p.y * sin;
          const ry = p.x * sin + p.y * cos;
          const ax = cx + rx;
          const ay = cy + ry;
          if(ax < minX) minX = ax;
          if(ay < minY) minY = ay;
          if(ax > maxX) maxX = ax;
          if(ay > maxY) maxY = ay;
        }
        return { minX, minY, maxX, maxY };
      }

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for(const it of items){
        const b = boundsOfItem(it);
        if(b.minX < minX) minX = b.minX;
        if(b.minY < minY) minY = b.minY;
        if(b.maxX > maxX) maxX = b.maxX;
        if(b.maxY > maxY) maxY = b.maxY;
      }

      minX -= PAD; minY -= PAD; maxX += PAD; maxY += PAD;

      const W = Math.max(1, Math.ceil(maxX - minX));
      const H = Math.max(1, Math.ceil(maxY - minY));

      const EXPORT_SCALE = Math.max(3, Math.ceil(window.devicePixelRatio || 1));

      const canvas = document.createElement("canvas");
      canvas.width = Math.round(W * EXPORT_SCALE);
      canvas.height = Math.round(H * EXPORT_SCALE);

      const ctx = canvas.getContext("2d", { alpha: true });
      ctx.scale(EXPORT_SCALE, EXPORT_SCALE);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      if(!exportPNG._cache) exportPNG._cache = new Map();
      const cache = exportPNG._cache;

      function loadImage(url){
        if(cache.has(url)) return cache.get(url);
        const p = new Promise((resolve, reject)=>{
          const im = new Image();
          im.crossOrigin = "anonymous";
          im.onload = ()=>resolve(im);
          im.onerror = ()=>reject(new Error("Image non chargeable: " + url));
          im.src = url;
        });
        cache.set(url, p);
        return p;
      }

      for(const it of items){
        const lib = libById(it.libId);
        if(!lib) continue;

        let im;
        try { im = await loadImage(lib.src); }
        catch(e){ console.warn(e); continue; }

        ctx.save();

        const cx = (it.x + it.w/2) - minX;
        const cy = (it.y + it.h/2) - minY;

        const sx = it.flipX ? -1 : 1;
        const sy = it.flipY ? -1 : 1;

        ctx.translate(cx, cy);
        ctx.scale(sx, sy);
        ctx.rotate(((it.rot || 0) * Math.PI) / 180);

        const iw = im.naturalWidth || im.width;
        const ih = im.naturalHeight || im.height;
        const scale = Math.min(it.w / iw, it.h / ih);
        const dw = iw * scale;
        const dh = ih * scale;

        ctx.drawImage(im, -dw/2, -dh/2, dw, dh);
        ctx.restore();
      }

      canvas.toBlob((blob)=>{
        if(!blob) { showToast("Export PNG impossible"); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "flash-compo.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
        showToast("PNG exporté");
      }, "image/png");
    }

    // --- Boutons desktop ---
    document.getElementById("btnClear").addEventListener("click", ()=>{
      if(!selected){
        showToast("Aucun élément sélectionné");
        return;
      }
      const uid = selected.uid;
      selected.el.remove();
      deselect();
      removeItemByUid(uid);
      showToast("Élément supprimé");
    });

    document.getElementById("btnCenter").addEventListener("click", ()=>{
      if(!selected){ showToast("Aucun élément sélectionné"); return; }
      selected.x = (ws.clientWidth - selected.w)/2;
      selected.y = (ws.clientHeight - selected.h)/2;
      selected.apply();
    });

    document.getElementById("btnToFront").addEventListener("click", ()=>{
      if(!selected){ showToast("Aucun élément sélectionné"); return; }
      selected.el.style.zIndex = String(++zCounter);
    });

    document.getElementById("btnToBack").addEventListener("click", ()=>{
      if(!selected){ showToast("Aucun élément sélectionné"); return; }
      selected.el.style.zIndex = "1";
    });

    document.getElementById("btnFlipH").addEventListener("click", ()=>{
      if(!selected){ showToast("Aucun élément sélectionné"); return; }
      selected.flipX = !selected.flipX;
      selected.apply();
    });

    document.getElementById("btnFlipV").addEventListener("click", ()=>{
      if(!selected){ showToast("Aucun élément sélectionné"); return; }
      selected.flipY = !selected.flipY;
      selected.apply();
    });

    document.getElementById("btnExportPNG").addEventListener("click", exportPNG);

    // --- Mobile FAB ---
    function bindMobileQuickActions(){
      const toolsBtn = document.getElementById("btnMobileTools");
      const toolsPanel = document.getElementById("mobileToolsPanel");
      const exportBtn = document.getElementById("btnMobileExport");

      function closeMobileTools(){
        toolsPanel.classList.remove("open");
      }

      function bindMobileAction(mobileId, desktopId){
        const mobileBtn = document.getElementById(mobileId);
        const desktopBtn = document.getElementById(desktopId);
        if(!mobileBtn || !desktopBtn) return;

        mobileBtn.addEventListener("click", (e)=>{
          e.stopPropagation();
          desktopBtn.click();
          closeMobileTools();
        });
      }

      if(toolsBtn && toolsPanel){
        toolsBtn.addEventListener("click", (e)=>{
          e.stopPropagation();
          toolsPanel.classList.toggle("open");
        });

        toolsPanel.addEventListener("click", (e)=>{
          e.stopPropagation();
        });

        document.addEventListener("click", ()=>{
          closeMobileTools();
        });
      }

      if(exportBtn){
        exportBtn.addEventListener("click", (e)=>{
          e.stopPropagation();
          document.getElementById("btnExportPNG").click();
        });
      }

      bindMobileAction("btnMobileClear", "btnClear");
      bindMobileAction("btnMobileCenter", "btnCenter");
      bindMobileAction("btnMobileFlipH", "btnFlipH");
      bindMobileAction("btnMobileFlipV", "btnFlipV");
      bindMobileAction("btnMobileBack", "btnToBack");
      bindMobileAction("btnMobileFront", "btnToFront");
    }

    // --- Init ---
    resizeWorkspaceForMobile();
    window.addEventListener("resize", resizeWorkspaceForMobile);
    renderPalette();
    bindKeyboard();
    bindMobileQuickActions();
  </script>
